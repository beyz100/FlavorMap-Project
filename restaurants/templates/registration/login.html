<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        :root {
            --primary: #ff6b35;
            --primary-dark: #e05520;
            --primary-soft: #fff0ea;
            --text-dark: #1a1a2e;
            --text-mid: #4a4a68;
            --border: #e8e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #fff0ea, #ffe2d4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        .login-box {
            background: #fff;
            padding: 2.5rem;
            border-radius: 14px;
            width: 340px;
            box-shadow: 0 10px 30px rgba(26,26,46,0.10);
        }

        h2 {
            text-align: center;
            margin: 0 0 1.5rem;
            color: var(--primary);
        }

        form p {
            margin: 0 0 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 0.35rem;
        }

        input {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            transition: background 0.15s;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .helptext, .errorlist {
            font-size: 0.8rem;
            color: var(--text-mid);
        }

        .errorlist {
            list-style: none;
            padding: 0;
            margin: 0.25rem 0 0;
            color: #c0392b;
        }

        .register-link {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.9rem;
            color: var(--text-mid);
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <div class="register-link">
        <p>Don't have an account? <a href="/register/">Register</a></p>
    </div>
</div>

</body>
</html>
