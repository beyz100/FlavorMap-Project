{% extends 'restaurants/base.html' %}

{% block content %}
    <h1>Log in</h1>

    {% if form.errors %}
        <p>Your username and password did not match. Please try again.</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p>You need an account to write reviews, save favorites, and view your profile.</p>
{% endblock %}
