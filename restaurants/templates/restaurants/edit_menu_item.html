<h2>Edit Menu Item</h2>

<form method="POST">
    {% csrf_token %}

    <label>Name:</label><br>
    <input type="text" name="name" value="{{ menu_item.name }}"><br><br>

    <label>Description:</label><br>
    <textarea name="description">{{ menu_item.description }}</textarea><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="{{ menu_item.price }}"><br><br>

    <button type="submit">Save</button>
</form>
