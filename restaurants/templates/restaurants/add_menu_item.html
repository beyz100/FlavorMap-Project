<h2>Add Menu Item</h2>

<form method="POST">
    {% csrf_token %}
    
    <label>Name:</label><br>
    <input type="text" name="name"><br><br>

    <label>Description:</label><br>
    <textarea name="description"></textarea><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price"><br><br>

    <button type="submit">Add</button>
</form>
