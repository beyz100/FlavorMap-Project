<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlavorMap</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'restaurants:home' %}">Home</a> |
            <a href="{% url 'restaurants:list' %}">Restaurants</a> |
            <a href="{% url 'restaurants:about' %}">About Us</a> |
            <a href="{% url 'restaurants:contact' %}">Contact</a>
            {% if user.is_authenticated %}
                | <a href="{% url 'restaurants:profile' %}">Profile</a>
                | <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Log out</button>
                </form>
            {% else %}
                | <a href="{% url 'login' %}">Log in</a>
            {% endif %}
        </nav>
    </header>
    <hr>

    <main>
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}
        {% endblock %}
    </main>

    <hr>
</body>
</html>
